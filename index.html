<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p>Enter the city you whant to check</p>
    <input type="text" id="city" />
    <button id="check">Check</button>
    <div class="container">
      <div class="temp">
        <h1 class="cityName"></h1>
        <p class="tempInfo"></p>
      </div>
      <div class="info">
        <h2>Description:</h2>
        <p class="des"></p>
        <h2>Humidity:</h2>
        <p class="hum"></p>
        <h2>Conditions:</h2>
        <p class="con"></p>
        <h2>Wind speed:</h2>
        <p class="ws"></p>
      </div>
    </div>
  </body>
</html>
